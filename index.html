<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>K4NAE — Desenvolvedor de Bots & Interfaces Web</title>
    <meta name="description" content="K4NAE é um desenvolvedor fullstack especializado em bots para Discord, automações e interfaces web modernas. Baseado em Campinas, SP." />
    <meta name="keywords" content="K4NAE, desenvolvedor, bots Discord, automação, React, Node.js, TypeScript, web, fullstack, Campinas" />
    <meta name="author" content="K4NAE" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://k4nae.dev" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://k4nae.dev" />
    <meta property="og:title" content="K4NAE — Desenvolvedor de Bots & Interfaces Web" />
    <meta property="og:description" content="Especialista em criar soluções digitais de alto impacto — bots inteligentes e interfaces web modernas e performáticas." />
    <meta property="og:image" content="https://k4nae.dev/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="K4NAE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://k4nae.dev" />
    <meta name="twitter:title" content="K4NAE — Desenvolvedor de Bots & Interfaces Web" />
    <meta name="twitter:description" content="Especialista em criar soluções digitais de alto impacto — bots inteligentes e interfaces web modernas e performáticas." />
    <meta name="twitter:image" content="https://k4nae.dev/og-image.png" />
    <meta name="twitter:creator" content="@thek4nae" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Prevent FOUC: apply saved theme before paint -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('k4nae-theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>

    <!-- Anti-copy / anti-clone protection -->
    <script src="/protection.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
